apiVersion: apps/v1
kind: Deployment
metadata:
  name: katpool-victoria-metrics
  namespace: katpool
  labels:
    app: katpool-victoria-metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: katpool-victoria-metrics
  template:
    metadata:
      labels:
        app: katpool-victoria-metrics
    spec:
      containers:
      - name: katpool-victoria-metrics
        image: victoriametrics/victoria-metrics:v1.93.4
        imagePullPolicy: Always
        args:
        - '-storageDataPath=/victoria-metrics-data'
        - '-retentionPeriod=1y'
        - '-httpListenAddr=:8428'
        - '-memory.allowedPercent=60'
        - '-search.maxConcurrentRequests=8'
        - '-search.maxQueryDuration=60s'
        - '-search.maxSeries=500000000'
        - '-search.maxUniqueTimeseries=500000000'
        - '-search.maxSamplesPerQuery=500000000'
        - '-search.maxPointsPerTimeseries=500000000'
        ports:
        - containerPort: 8428
          name: victoria-8428
        volumeMounts:
        - name: victoria-data
          mountPath: /victoria-metrics-data
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8428
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8428
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: victoria-data
        persistentVolumeClaim:
          claimName: victoria-metrics-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: katpool-victoria-metrics
  namespace: katpool
spec:
  selector:
    app: katpool-victoria-metrics
  ports:
  - port: 8428
    targetPort: 8428
    name: victoria-8428
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: victoria-metrics-pvc
  namespace: katpool
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
  # Optional: Uncomment to specify storage class
  # storageClassName: standard
