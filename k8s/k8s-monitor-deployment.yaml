apiVersion: apps/v1
kind: Deployment
metadata:
  name: katpool-monitor
  namespace: katpool
  labels:
    app: katpool-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: katpool-monitor
  template:
    metadata:
      labels:
        app: katpool-monitor
    spec:
      containers:
      - name: katpool-monitor
        image: ghcr.io/nacho-the-kat/katpool-monitor:beta-v1.0.2-main
        imagePullPolicy: Always
        ports:
        - containerPort: 9301
          name: monitor-9301
        - containerPort: 9300
          name: monitor-9300
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
        env:
        - name: DATABASE_URL_MONITOR
          valueFrom:
            secretKeyRef:
              name: katpool-secrets
              key: DATABASE_URL_MONITOR
        - name: DEBUG
          valueFrom:
            secretKeyRef:
              name: katpool-secrets
              key: DEBUG
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: katpool-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: katpool-secrets
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: katpool-secrets
              key: POSTGRES_DB
        - name: POSTGRES_HOSTNAME
          valueFrom:
            secretKeyRef:
              name: katpool-secrets
              key: POSTGRES_HOSTNAME
        - name: POSTGRES_PORT
          value: "5432"
        - name: TREASURY_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: katpool-secrets
              key: TREASURY_PRIVATE_KEY
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: katpool-secrets
              key: DATABASE_URL
        - name: MONITOR
          valueFrom:
            secretKeyRef:
              name: katpool-secrets
              key: MONITOR
        - name: DATADOG_LOG_URL
          valueFrom:
            secretKeyRef:
              name: katpool-secrets
              key: DATADOG_LOG_URL
        - name: DATADOG_SECRET
          valueFrom:
            secretKeyRef:
              name: katpool-secrets
              key: DATADOG_SECRET
        - name: DATADOG_SERVICE_NAME
          valueFrom:
            secretKeyRef:
              name: katpool-secrets
              key: DATADOG_MONITOR_SERVICE_NAME
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
        livenessProbe:
          tcpSocket:
            port: 9301
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 9301
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: config-volume
        configMap:
          name: katpool-config
---
apiVersion: v1
kind: Service
metadata:
  name: katpool-monitor
  namespace: katpool
spec:
  selector:
    app: katpool-monitor
  ports:
  - port: 9301
    targetPort: 9301
    name: monitor-9301
  - port: 9300
    targetPort: 9300
    name: monitor-9300 