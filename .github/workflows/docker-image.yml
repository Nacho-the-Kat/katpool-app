name: Docker Push katpool-app image

on:
  push:

env:
  REGISTRY: ghcr.io

jobs:
  build_and_publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: get repository name
        run: |
          echo "REPOSITORY_NAME=${OWNER,,}" >>${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository }}'

      - name: Extract Branch Name
        id: extract_branch
        run: echo "branch_name=$(echo ${GITHUB_REF#refs/heads/} | sed 's/\//-/g')" >> $GITHUB_ENV

      - name: Docker Login
        run: echo "${{ secrets.GB_KATPOOL_TOKEN }}" | docker login ${{ env.REGISTRY }} --username argonmining --password-stdin

      - name: Docker Build with cargo build cache
        env:
          IMAGE_NAME: ${{ env.REPOSITORY_NAME }}:beta-v1.0.2-${{ env.branch_name }}
        run: |
          # Define cache location
          CACHE_REPO="${{ env.REGISTRY }}/cache-repo"

          # Build Docker image with caching
          docker buildx build \
            --cache-from=${CACHE_REPO}:latest \
            --cache-to=${CACHE_REPO}:new,mode=max \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --file ./Dockerfile .
                   
      - name: Docker Push
        env:
          IMAGE_NAME: ${{ env.REPOSITORY_NAME }}:beta-v1.0.2-${{ env.branch_name }}
        run: docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Docker Build DB Backup
        env:
          IMAGE_NAME: ${{ env.REPOSITORY_NAME }}-db-backup:beta-v1.0.2-${{ env.branch_name }}
        run: docker build -f backup/Dockerfile -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} backup/

      - name: Docker Push DB Backup
        env:
          IMAGE_NAME: ${{ env.REPOSITORY_NAME }}-db-backup:beta-v1.0.2-${{ env.branch_name }}
        run: docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
